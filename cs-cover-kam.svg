<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <pattern id="dots-k" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(255,255,255,0.07)"/>
    </pattern>
    <clipPath id="clip-k"><rect x="330" y="40" width="270" height="300"/></clipPath>
  </defs>

  <!-- Background: dark navy -->
  <rect width="600" height="380" fill="#1c2b3a"/>
  <!-- Dot texture right panel -->
  <rect x="330" y="60" width="270" height="270" fill="url(#dots-k)"/>
  <!-- Accent arc -->
  <circle cx="560" cy="180" r="130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" clip-path="url(#clip-k)"/>
  <circle cx="560" cy="180" r="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" clip-path="url(#clip-k)"/>
  <!-- Warm accent top bar -->
  <rect x="0" y="0" width="600" height="3" fill="#8B6F4E"/>

  <!-- Category -->
  <text x="36" y="50" font-size="10" fill="rgba(255,255,255,0.55)" font-family="Arial,sans-serif" letter-spacing="2">KEY ACCOUNT MANAGEMENT · BUSINESS DEVELOPMENT · 2021</text>

  <!-- Title -->
  <text x="36" y="105" font-size="27" font-weight="400" fill="#ffffff" font-family="Georgia,serif">Exclusive Distributor</text>
  <text x="36" y="143" font-size="27" font-weight="400" fill="#ffffff" font-family="Georgia,serif">Win &amp; China Market</text>
  <text x="36" y="181" font-size="27" font-weight="400" fill="#8B6F4E" font-family="Georgia,serif" font-style="italic">Entry</text>

  <!-- Rule -->
  <rect x="36" y="206" width="200" height="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Competition visual: 3 columns, 2 grey + 1 accent -->
  <!-- Column 1: grey -->
  <rect x="44"  y="222" width="52" height="66" fill="rgba(255,255,255,0.1)" rx="1"/>
  <text x="70" y="262" font-size="10" fill="rgba(255,255,255,0.3)" font-family="Arial,sans-serif" text-anchor="middle">Agency A</text>
  <!-- Column 2: grey -->
  <rect x="108" y="222" width="52" height="66" fill="rgba(255,255,255,0.1)" rx="1"/>
  <text x="134" y="262" font-size="10" fill="rgba(255,255,255,0.3)" font-family="Arial,sans-serif" text-anchor="middle">Agency B</text>
  <!-- Column 3: accent (winner) -->
  <rect x="172" y="210" width="52" height="78" fill="#8B6F4E" rx="1"/>
  <text x="198" y="258" font-size="10" fill="rgba(255,255,255,0.9)" font-family="Arial,sans-serif" text-anchor="middle" font-weight="bold">Awarded</text>
  <!-- Check mark -->
  <text x="198" y="238" font-size="14" fill="rgba(255,255,255,0.9)" font-family="Arial,sans-serif" text-anchor="middle">✓</text>

  <!-- Caption under visual -->
  <text x="36" y="316" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial,sans-serif" letter-spacing="1.5">3-WAY COMPETITIVE BID · EXCLUSIVE GENERAL-AGENT MANDATE</text>

  <!-- Bottom bar -->
  <rect x="0" y="340" width="600" height="40" fill="rgba(0,0,0,0.15)"/>
  <text x="36" y="364" font-size="9.5" fill="rgba(255,255,255,0.45)" font-family="Arial,sans-serif" letter-spacing="1.8">MARKET ENTRY · COMMERCIAL ARCHITECTURE · ACCOUNT MANAGEMENT</text>
  <text x="494" y="364" font-size="9.5" fill="rgba(255,255,255,0.85)" font-family="Arial,sans-serif" letter-spacing="1.2">READ →</text>
</svg>
