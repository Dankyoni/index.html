<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <pattern id="dots-k" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <clipPath id="clip-k"><rect x="330" y="40" width="270" height="300"/></clipPath>
  </defs>

  <!-- Background: warm beige -->
  <rect width="600" height="380" fill="#F3E9D8"/>
  <!-- Dot texture right panel -->
  <rect x="330" y="80" width="270" height="260" fill="url(#dots-k)"/>
  <!-- Arc decorative -->
  <circle cx="560" cy="165" r="118" fill="none" stroke="rgba(139,111,78,0.12)" stroke-width="1.5" clip-path="url(#clip-k)"/>
  <circle cx="560" cy="165" r="88" fill="none" stroke="rgba(139,111,78,0.10)" stroke-width="1" clip-path="url(#clip-k)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="600" height="3" fill="#8B6F4E"/>

  <!-- Category -->
  <text x="36" y="50" font-size="10" fill="#8B6F4E" font-family="Arial,sans-serif" letter-spacing="2">KEY ACCOUNT MANAGEMENT · BUSINESS DEVELOPMENT · 2021</text>

  <!-- Title -->
  <text x="36" y="102" font-size="29" font-weight="400" fill="#2a1a0a" font-family="Georgia,serif">Exclusive Distributor</text>
  <text x="36" y="141" font-size="29" font-weight="400" fill="#2a1a0a" font-family="Georgia,serif">Win &amp; China Market</text>

  <!-- Subtitle italic -->
  <text x="36" y="176" font-size="13" fill="rgba(80,50,20,0.68)" font-family="Georgia,serif" font-style="italic">3-Way Competitive Bid · Exclusive General-Agent Mandate</text>

  <!-- Rule -->
  <rect x="36" y="200" width="200" height="1" fill="rgba(139,111,78,0.35)"/>

  <!-- Competition visual: 3 columns, 2 muted + 1 accent winner -->
  <!-- Baseline -->
  <rect x="36" y="298" width="220" height="1" fill="rgba(139,111,78,0.2)"/>
  <!-- Agency A column -->
  <rect x="44"  y="258" width="52" height="40" fill="rgba(139,111,78,0.14)" rx="1"/>
  <text x="70" y="283" font-size="9.5" fill="rgba(80,50,20,0.4)" font-family="Arial,sans-serif" text-anchor="middle" letter-spacing="0.5">Agency A</text>
  <!-- Agency B column -->
  <rect x="110" y="248" width="52" height="50" fill="rgba(139,111,78,0.14)" rx="1"/>
  <text x="136" y="276" font-size="9.5" fill="rgba(80,50,20,0.4)" font-family="Arial,sans-serif" text-anchor="middle" letter-spacing="0.5">Agency B</text>
  <!-- Winner column (taller, accent) -->
  <rect x="176" y="218" width="52" height="80" fill="#8B6F4E" rx="1"/>
  <text x="202" y="253" font-size="12" fill="rgba(255,255,255,0.9)" font-family="Arial,sans-serif" text-anchor="middle">✓</text>
  <text x="202" y="270" font-size="9.5" fill="rgba(255,255,255,0.88)" font-family="Arial,sans-serif" text-anchor="middle" letter-spacing="0.5">Awarded</text>

  <!-- Caption -->
  <text x="36" y="316" font-size="9" fill="rgba(80,50,20,0.4)" font-family="Arial,sans-serif" letter-spacing="1.5">COMPETITIVE WIN · EXCLUSIVE DISTRIBUTION RIGHTS · CHINA</text>

  <!-- Bottom bar -->
  <rect x="0" y="340" width="600" height="40" fill="rgba(0,0,0,0.04)"/>
  <text x="36" y="364" font-size="9.5" fill="rgba(80,50,20,0.4)" font-family="Arial,sans-serif" letter-spacing="1.8">MARKET ENTRY · COMMERCIAL ARCHITECTURE · ACCOUNT MANAGEMENT</text>
  <text x="490" y="364" font-size="9.5" fill="#8B6F4E" font-family="Arial,sans-serif" letter-spacing="1.2">READ →</text>
</svg>
