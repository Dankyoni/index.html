<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <pattern id="dots2" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(0,0,0,0.07)"/>
    </pattern>
    <clipPath id="clip-arc">
      <rect x="330" y="50" width="270" height="290"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="380" fill="#8B6F4E"/>
  <!-- Dot texture -->
  <rect x="330" y="80" width="270" height="260" fill="url(#dots2)"/>
  <!-- Arc decorative -->
  <circle cx="560" cy="165" r="118" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" clip-path="url(#clip-arc)"/>
  <circle cx="560" cy="165" r="88"  fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"   clip-path="url(#clip-arc)"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="600" height="3" fill="rgba(0,0,0,0.15)"/>

  <!-- Category -->
  <text x="36" y="50" font-size="10" fill="rgba(255,255,255,0.65)" font-family="Arial,sans-serif" letter-spacing="2">CONSUMER ELECTRONICS · ORAL CARE · CHINA MARKET</text>

  <!-- Title -->
  <text x="36" y="102" font-size="30" font-weight="400" fill="#ffffff" font-family="Georgia,serif">China Electric</text>
  <text x="36" y="142" font-size="30" font-weight="400" fill="#ffffff" font-family="Georgia,serif">Toothbrush Market</text>

  <!-- Subtitle -->
  <text x="36" y="178" font-size="13.5" fill="rgba(255,255,255,0.72)" font-family="Georgia,serif" font-style="italic">Mid-Term Strategy Review &amp; Competitive Mapping</text>

  <!-- Rule -->
  <rect x="36" y="202" width="200" height="1" fill="rgba(255,255,255,0.25)"/>

  <!-- Stats -->
  <text x="36"  y="242" font-size="30" font-weight="400" fill="#ffffff" font-family="Georgia,serif">3</text>
  <text x="36"  y="261" font-size="9.5" fill="rgba(255,255,255,0.55)" font-family="Arial,sans-serif" letter-spacing="1.8">BRANDS BENCHMARKED</text>

  <text x="170" y="242" font-size="30" font-weight="400" fill="#ffffff" font-family="Georgia,serif">~45</text>
  <text x="170" y="261" font-size="9.5" fill="rgba(255,255,255,0.55)" font-family="Arial,sans-serif" letter-spacing="1.8">SLIDES</text>

  <text x="258" y="242" font-size="30" font-weight="400" fill="#ffffff" font-family="Georgia,serif">Public</text>
  <text x="258" y="261" font-size="9.5" fill="rgba(255,255,255,0.55)" font-family="Arial,sans-serif" letter-spacing="1.8">DATA SOURCES</text>

  <!-- Bottom bar -->
  <rect x="0" y="340" width="600" height="40" fill="rgba(0,0,0,0.1)"/>
  <text x="36" y="364" font-size="9.5" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif" letter-spacing="1.8">MARKET RESEARCH · STRATEGY CONSULTING</text>
  <text x="490" y="364" font-size="9.5" fill="rgba(255,255,255,0.9)" font-family="Arial,sans-serif" letter-spacing="1.2">READ →</text>
</svg>
