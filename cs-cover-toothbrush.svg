<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <pattern id="dots2" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <clipPath id="clip-arc"><rect x="330" y="50" width="270" height="290"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="380" fill="#F3E9D8"/>
  <!-- Dot texture -->
  <rect x="330" y="80" width="270" height="260" fill="url(#dots2)"/>
  <!-- Arc decorative -->
  <circle cx="560" cy="165" r="118" fill="none" stroke="rgba(139,111,78,0.12)" stroke-width="1.5" clip-path="url(#clip-arc)"/>
  <circle cx="560" cy="165" r="88" fill="none" stroke="rgba(139,111,78,0.10)" stroke-width="1" clip-path="url(#clip-arc)"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="600" height="3" fill="#8B6F4E"/>

  <!-- Category -->
  <text x="36" y="50" font-size="10" fill="#8B6F4E" font-family="Arial,sans-serif" letter-spacing="2">HEALTHCARE · MEDICAL DEVICE · CHINA SLEEP THERAPY</text>

  <!-- Title -->
  <text x="36" y="102" font-size="29" font-weight="400" fill="#2a1a0a" font-family="Georgia,serif">China Home PAP</text>
  <text x="36" y="141" font-size="29" font-weight="400" fill="#2a1a0a" font-family="Georgia,serif">Market Review</text>

  <!-- Subtitle -->
  <text x="36" y="178" font-size="13" fill="rgba(80,50,20,0.68)" font-family="Georgia,serif" font-style="italic">Competitive Landscape · 3-Brand Leading Company Study</text>

  <!-- Rule -->
  <rect x="36" y="202" width="200" height="1" fill="rgba(139,111,78,0.35)"/>

  <!-- Price band distribution bar (proportional, no numbers) -->
  <!-- Entry: narrow, Low-mid, Core: widest, Mid-high, Premium, High-end -->
  <rect x="36"  y="228" width="8"  height="18" fill="#e8e4de" rx="1"/>
  <rect x="46"  y="228" width="42" height="18" fill="#c5bfb5" rx="1"/>
  <rect x="90"  y="228" width="74" height="18" fill="#1c2b3a" rx="1"/>
  <rect x="166" y="228" width="54" height="18" fill="#2e4a62" rx="1"/>
  <rect x="222" y="228" width="36" height="18" fill="#8B6F4E" rx="1"/>
  <rect x="260" y="228" width="28" height="18" fill="#b8956e" rx="1"/>

  <text x="36"  y="262" font-size="8" fill="rgba(80,50,20,0.45)" font-family="Arial,sans-serif" letter-spacing="0.5">Entry</text>
  <text x="90"  y="262" font-size="8" fill="rgba(80,50,20,0.45)" font-family="Arial,sans-serif" letter-spacing="0.5">Core ★</text>
  <text x="222" y="262" font-size="8" fill="rgba(80,50,20,0.45)" font-family="Arial,sans-serif" letter-spacing="0.5">Premium</text>

  <text x="36" y="285" font-size="8.5" fill="rgba(80,50,20,0.38)" font-family="Arial,sans-serif" letter-spacing="0.8">Price Band · Tmall Unit Volume Distribution (Proportional)</text>

  <!-- Caption -->
  <text x="36" y="310" font-size="9" fill="rgba(80,50,20,0.4)" font-family="Arial,sans-serif" letter-spacing="1.5">CLIENT ANONYMIZED · NRI SHANGHAI · 2024</text>

  <!-- Bottom bar -->
  <rect x="0" y="340" width="600" height="40" fill="rgba(0,0,0,0.04)"/>
  <text x="36" y="364" font-size="9.5" fill="rgba(80,50,20,0.4)" font-family="Arial,sans-serif" letter-spacing="1.8">CPAP · APAP · BiPAP · MEDICAL DEVICE · CHINA MARKET</text>
  <text x="490" y="364" font-size="9.5" fill="#8B6F4E" font-family="Arial,sans-serif" letter-spacing="1.2">READ →</text>
</svg>
